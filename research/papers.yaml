- title: "Building Tolerance for Backsliding By Trash Talking Democracy: Theory and Evidence from Mexico"
  type: "Article"
  author:
    - Lautaro Cella 
    - Ipek Cinar
    - Susan Stokes
    - Andres Uribe
  date: 2025-03-20
  year: 2025
  journal: "Comparative Political Studies"
  pubopen: "https://doi.org/10.1177/00104140251328024"
  dataverse: "https://dataverse.harvard.edu/dataset.xhtml?persistentId=doi:10.7910/DVN/4C8VGG"
  pdf: "../files/cps-mexico2025.pdf"
  appendix: "../files/cps2025-app.pdf"
  categories:
    - Democratic Erosion
    - Latin American Politics
  abstract: "Leaders who seek to build public toleration for democratic backsliding have a little-noticed strategy at their disposal: degrading their democracies in the eyes of their citizens. If voters can be induced to believe that their democracy is already broken, then nothing of value is lost when leaders attack the courts, vilify the press, or undermine confidence in elections. We call this strategy trash-talking democracy, and study it in the context of contemporary Mexico. We use text-as-data methods to show that President Andrés Manuel López Obrador spent more time trash-talking his democracy than he did deepening partisan polarization. With a survey experiment we show that exposure to López Obrador’s trash-talking of the courts elicits anti-democratic attitudes among Mexicans — both among his supporters and among supporters of the opposition. Strategies to resist backsliding should include not just efforts at de-polarization but also at restoring confidence in democratic institutions."




- title: "Income Inequality and the Erosion of Democracy in the Twenty-First Century"
  type: "Article"
  author:
    - Eli G. Rau
    - Susan Stokes
  date: 2025-01-05
  year: 2025
  journal: "Proceedings of the National Academy of Sciences"
  pubopen: "https://www.pnas.org/doi/10.1073/pnas.2422543121"
  dataverse: "https://dataverse.harvard.edu/dataset.xhtml?persistentId=doi:10.7910/DVN/KTXHGV"
  pdf: "../files/pnas2025.pdf"
  appendix: "../files/pnas2025-app.pdf"
  categories:
    - Democratic Erosion
    - Political Economy
  abstract: "Among the most pressing problems societies face today are economic inequality and the erosion of democratic norms and institutions. In fact the two problems—inequality and democratic erosion—are linked. In a large cross-national statistical study of risk factors for democratic erosion, we establish that economic inequality is one of the strongest predictors of where and when democracy erodes. Even wealthy and longstanding democracies are vulnerable if they are highly unequal (though national wealth might provide some resiliency). The association between inequality and risk of democratic backsliding is robust, and holds under different measures and structures of both income inequality and wealth inequality. The association is unlikely to be a case of reverse causation. For concerned citizens seeking to understand why so many democracies are eroding and how to stop this process, our study indicates that policies for ameliorating inequality are a promising path forward."
  related: 
    - "<u>Related Letter</u>: Rau, E.G. and Stokes, S.C. (2025). Reply to Fiscella: Why study erosion now? And why these risk factors? <em>Proceedings of the National Academy of Sciences</em>, 122(12), e2501249122. <a href='https://www.pnas.org/doi/abs/10.1073/pnas.2501249122' target='_blank'>Link</a> / <a href='../files/pnas2025-reply.pdf' target='_blank'>PDF</a>"


- title: "Why is Participation Low in Referendums? Lessons from Latin America"
  type: "Article"
  author: 
    - Eli G. Rau
    - Radha Sarkar
    - Susan Stokes
  date: 2025-06-15
  year: 2025
  journal: "Latin American Research Review"
  dataverse: "https://dataverse.harvard.edu/dataset.xhtml?persistentId=doi:10.7910/DVN/EXYX5U"
  pdf: "../files/larr2025.pdf"
  appendix: "../files/larr2025-app.pdf"
  categories:
    - Participation
    - Latin American Politics
    - Institutions
  abstract: "Whether referendums, initiatives, and other mechanisms of direct democracy enhance representative systems is a matter of debate. Skeptics note — among other criticisms — that turnout tends to be low in referendums, often lower than in candidate elections in the same country. If citizens do not care enough to participate, how useful can these mechanisms be for improving the quality of democratic systems? We argue that low referendum turnout has as much to do with parties’ disincentives to mobilize voters as with voter disinterest. Prior research on political behavior in referendums has focused largely on Europe, and assumes that voters view them as elections of lesser importance. By shifting focus to Latin America, we introduce more variation in the features of political parties that influence levels of turnout. We draw on cross-national evidence, qualitative research in Colombia, and quantitative analysis of municipal-level referendum voting behavior in Brazil. The key to understanding low voter turnout in these settings is the relatively weaker incentives that political parties have to turn out the vote when control over office is not at stake. We demonstrate that, in clientelistic systems, party operatives have particularly weak incentives to get their constituents out to the polls."


- title: "The Effect of Electoral Inversions on Democratic Legitimacy: Evidence from the United States"
  type: "Article"
  author:
    - John M. Carey
    - Gretchen Helmke
    - Brendan Nyhan
    - Mitchell Sanders
    - Susan Stokes
    - Shun Yamaya
  year: 2022
  date: 2022-06-01
  journal: "British Journal of Political Science"
  pdf: "../files/bjps2022.pdf"
  pubopen: "https://www.cambridge.org/core/journals/british-journal-of-political-science/article/abs/effect-of-electoral-inversions-on-democratic-legitimacy-evidence-from-the-united-states/2C90A3FB13785C8DCFB52617A023AE8D"
  dataverse: "https://dataverse.harvard.edu/dataset.xhtml?persistentId=doi:10.7910/DVN/YZZFTK"
  categories: 
    - Democratic Erosion
    - U.S. Politics
  abstract: "When a party or candidate loses the popular vote but still wins the election, do voters view the winner as legitimate? This scenario, known as an electoral inversion, describes the winners of two of the last six presidential elections in the United States. We report results from two experiments testing the effect of inversions on democratic legitimacy in the US context. Our results indicate that inversions significantly decrease the perceived legitimacy of winning candidates. Strikingly, this effect does not vary with the margin by which the winner loses the popular vote, nor by whether the candidate benefiting from the inversion is a co-partisan. The effect is driven by Democrats, who punish inversions regardless of candidate partisanship; few effects are observed among Republicans. These results suggest that the experience of inversions increases sensitivity to such outcomes among supporters of the losing party."

- title: "Who will defend democracy? Evaluating tradeoffs in candidate support among partisan donors and voters"
  type: "Article"
  author: 
    - John Carey
    - Katherine Clayton
    - Gretchen Helmke
    - Brendan Nyhan
    - Mitchell Sanders
    - Susan Stokes
  year: 2022
  date: 2022-05-01
  journal: "Journal of Elections, Public Opinion, and Parties"
  pdf: "../files/jepop2022.pdf"
  pubclosed: "https://www.tandfonline.com/doi/abs/10.1080/17457289.2020.1790577"
  dataverse: "https://dataverse.harvard.edu/dataset.xhtml?persistentId=doi:10.7910/DVN/MRWYC2"
  categories:
    - Democratic Erosion
  abstract: "Scholars and pundits fear that the American public’s commitment to democracy is declining and that citizens are willing to embrace candidates who would trample democratic principles. We examine whether violations of those principles generate resistance from voters and/or top campaign donors and whether such resistance extends across partisan lines. In a conjoint survey experiment, we investigate how regular Americans and donor elites trade off partisanship, policy positions, and support for democratic values when choosing between hypothetical political candidates. Our findings indicate that both citizens and donors punish candidates who endorse violations of democratic principles irrespective of the candidate’s party. However, partisans react very differently to candidates who support voter identification laws that threaten access to the franchise. This polarized response is especially strong among donors. These results suggest that the public and donors may sometimes be willing to forgive transgressions against democratic norms that align with their partisan and policy preferences."


- title: "Presidential Rhetoric and Populism"
  type: "Article"
  author: 
    - Ipek Çinar
    - Susan Stokes
    - Andres Uribe
  year: 2020
  date: 2020-06-01
  journal: "Presidential Studies Quarterly"
  pdf: "../files/psq2020.pdf"
  pubclosed: "https://onlinelibrary.wiley.com/doi/abs/10.1111/psq.12656"
  categories:
    - Democratic Erosion
  abstract: "Scholars and the general public have been struck by the norm-shattering rhetoric of President Donald J. Trump. His <q>rhetorical signature</q> is heavy with Manichean good-versus-evil messages, vilification of his opponents, and disdain for institutions and for evidence. But many politicians vilify their opponents and style themselves as uniquely able to solve their society’s problems. In fact, Trump’s Manichean discourse is typical of populist leaders, in the United States and around the world. Using text-as-data analysis of campaign rhetoric, we study the content and mood of presidential campaign speeches by a range of U.S. politicians, which allows a broader perspective not only on the uniqueness of Trump’s rhetoric, but also its continuities with the rhetoric of others. This analysis allows us to define Trump as a right-wing populist. Right-wing populists, like left-leaning ones, are anti-elitist and Manichean in words and outlook. However, the two versions of populism differ in the nature of the anti-elitism, with right-wing populists targeting political elites and left-wing ones targeting economic elites. Right-wing populists also define the <q>other</q> as ethnic out-groups, who threaten the ethnically pure <q>people.</q>"


- title: "Searching for Bright Lines in the Trump Presidency"
  type: "Article"
  author: 
    - John Carey
    - Gretchen Helmke
    - Brendan Nyhan
    - Mitchell Sanders
    - Susan Stokes
  year: 2019
  date: 2019-06-01
  journal: "Perspectives on Politics"
  pdf: "../files/pop2019.pdf"
  pubopen: "https://www.cambridge.org/core/journals/perspectives-on-politics/article/searching-for-bright-lines-in-the-trump-presidency/CB5F40CBC27EDA75F4D7FC7F171E6880"
  dataverse: "https://dataverse.harvard.edu/dataset.xhtml?persistentId=doi:10.7910/DVN/IYWXMF"
  categories:
    - Democratic Erosion
    - U.S. Politics
  abstract: "Is American democracy under threat? The question is more prominent in political debate now than at any time in recent memory. However, it is also too blunt; there is widespread recognition that democracy is multifaceted and that backsliding, when it occurs, tends to be piecemeal. To address these concerns, we provide original data from surveys of political science experts and the public measuring the perceived importance and performance of U.S. democracy on a number of dimensions during the first year-and-a-half of the Trump presidency. We draw on a theory of how politicians may transgress limits on their authority and the conditions under which constraints are self-enforcing. We connect this theory to our survey data in an effort to identify potential areas of agreement—bright lines—among experts and the public about the most important democratic principles and whether they have been violated. Public and expert perceptions often differ on the importance of specific democratic principles. In addition, though our experts perceive substantial democratic erosion, particularly in areas related to checks and balances, polarization between Trump supporters and opponents undermines any social consensus recognizing these violations."


- title: "Beyond Opportunity Costs: Campaign Messages, Anger, and Turnout among the Unemployed"
  type: "Article"
  author:
    - S. Erdem Aytaç
    - Eli G. Rau
    - Susan Stokes
  year: 2020
  date: 2020-09-01
  journal: "British Journal of Political Science"
  pdf: "../files/bjps2020.pdf"
  pubopen: "https://www.cambridge.org/core/journals/british-journal-of-political-science/article/beyond-opportunity-costs-campaign-messages-anger-and-turnout-among-the-unemployed/444928192590BEE9B4FB47BB4B7507D9"
  dataverse: "https://dataverse.harvard.edu/dataset.xhtml?persistentId=doi:10.7910/DVN/USKUR2&widget=dataverse@harvard"
  appendix: "../files/bjps2020-app.pdf"
  categories: 
    - Participation
    - Political Economy
  abstract: "Are people under economic stress more or less likely to vote, and why? With large observational datasets and a survey experiment involving unemployed Americans, we show that unemployment depresses participation. But it does so more powerfully when the unemployment rate is low, less powerfully when it is high. Whereas earlier studies have explained lower turnout among the unemployed by stressing the especially high opportunity costs these would-be voters face, our evidence points to the psychological effects of unemployment and of campaign messages about it. When unemployment is high, challengers have an incentive to blame the incumbent, thus eliciting anger among the unemployed. Psychologists have shown anger to be an approach or mobilizing emotion. When joblessness is low, campaigns tend to ignore it. The jobless thus remain in states of depression and self-blame, which are demobilizing emotions."

- title: "Why do People Join Backlash Movements? Lesson from Turkey"
  type: "Article"
  author: 
    - Erdem Aytaç
    - Luis Schiumerini
    - Susan Stokes
  year: 2018
  date: 2018-06-01
  journal: "Journal of Conflict Resolution"
  pdf: "../files/jcr2018.pdf"
  pubclosed: "https://journals.sagepub.com/doi/abs/10.1177/0022002716686828"
  categories:
    - Participation
  abstract: "When people learn that demonstrators are being subjected to harsh treatment by the police, sometimes their reaction is to join demonstrations. What explains the potentially mobilizing power of repression? Information-oriented theories posit that repression changes people’s beliefs about the likely success of the protests or the type of the government, thus encouraging them to join. Social–psychological theories posit that repression provokes a moral and emotional reaction from bystanders, and these emotional reactions are mobilizing. Our research offers a rare opportunity to test these theories, empirically, against one another. We offer experimental evidence from Turkey after the 2013 Gezi uprising. In this setting, emotional reactions appear to be the link between repression and backlash mobilization. Information-oriented theories of backlash mobilization may be less germane in democracies, in which people already have access to information about their governments, and in highly polarized polities, in which few people’s political affinities are up for grabs."
  
- title: "Protests and Repression in New Democracies"
  type: "Article"
  author:
    - Erdem Aytaç
    - Luis Schiumerini
    - Susan Stokes
  year: 2017
  date: 2017-05-01
  journal: "Perspectives on Politics"
  pdf: "../files/perspectives2017.pdf"
  pubclosed: "https://www.cambridge.org/core/journals/perspectives-on-politics/article/abs/protests-and-repression-in-new-democracies/E99269D609B4F3DD1231BD36E44C5BF4"
  categories:
    - Participation
  abstract: "Elected governments sometimes deal with protests by authorizing the police to use less-lethal tools of repression: water cannons, tear gas, rubber bullets, and the like. When these tactics fail to end protests and instead spark larger, backlash movements, some governments reduce the level of violence but others increase it, causing widespread injuries and loss of life. We study three recent cases of governments in new democracies facing backlash movements. Their decision to scale up or scale back police repression reflected the governments’ levels of electoral security. Secure governments with relatively unmovable majorities behind them feel freer to apply harsh measures. Less secure governments, those with volatile electoral support, contemplate that their hold on power might weaken should they inflict very harsh treatment on protesters; they have strong incentives to back down. Our original survey research and interviews with civilian authorities, police officials, and protest organizers in Turkey, Brazil, and Ukraine allow us to evaluate this explanation as well as a number of rival accounts. Our findings imply that elected governments that rest on very stable bases of support may be tempted to deploy tactics more commonly associated with authoritarian politics."
  
- title: "Catalyst or Cause? Legislation and the Demise of Machine Politics in Britain and the United States"
  type: "Article"
  author:
    - Edwin Camp
    - Avinash Dixit
    - Susan Stokes
  year: 2014
  date: 2014-06-01
  journal: "Legislative Studies Quarterly"
  pubclosed: "https://onlinelibrary.wiley.com/doi/abs/10.1111/lsq.12058"
  pdf: "../files/lsq2014.pdf"
  appendix: "../files/lsq2014-app.pdf"
  categories:
    - Clientelism
  abstract: "In the nineteenth century, British and American parties competed by hiring electoral agents to bribe and treat voters. British parties abruptly abandoned this practice in the 1880s. The conventional explanation is that legislation put an end to agent-mediated distribution. But this explanation leaves many questions unanswered. Why did the parties use agents for decades, even though they imposed great expense on candidates and were viewed as untrustworthy? And why, after decades of half-hearted reforms, did the House of Commons pass effective antibribery reforms only in 1883? In our formal model, parties hire agents to solve information problems, but agent-mediated distribution can be collectively suboptimal. Legislation can serve as a credibility device for shifting to less costly strategies."

