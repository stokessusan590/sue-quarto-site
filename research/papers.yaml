- title: "Perverse Accountability: A Formal Model of Machine Politics with Evidence from Argentina."
  type: "Article"
  author:
    - Susan Stokes
  year: 2005
  date: 2005-06-01
  journal: "American Political Science Review"
  pubclosed: "https://www.cambridge.org/core/journals/american-political-science-review/article/abs/perverse-accountability-a-formal-model-of-machine-politics-with-evidence-from-argentina/A2A7141AA5EC213E6C5FAFD86FBCC859"
  pdf: "../files/apsr2005.pdf"
  categories:
    - Clientelism
    - Argentina
  abstract: "Political machines (or clientelist parties) mobilize electoral support by trading particularistic benefits to voters in exchange for their votes. But if the secret ballot hides voters' actions from the machine, voters are able to renege, accepting benefits and then voting as they choose. To explain how machine politics works, I observe that machines use their deep insertion into voters' social networks to try to circumvent the secret ballot and infer individuals' votes. When parties influence how people vote by threatening to punish them for voting for another party, I call this accountability. I analyze the strategic interaction between machines and voters as an iterated prisoners' dilemma game with one-sided uncertainty. The game generates hypotheses about the impact of the machine's capacity to monitor voters, and of voters' incomes and ideological stances, on the effectiveness of machine politics. I test these hypotheses with data from Argentina."
  related: 
    - "Heinz Eulau Prize for Best Article in the <em>American Political Science Review</em>"
    
- title: "Vote Buying in Argentina"
  type: "Article"
  author:
    - Valeria Brusco
    - Marcelo Nazareno
    - Susan Stokes
  year: 2004
  date: 2004-06-01
  journal: "Latin American Research Review"
  pdf: "../files/larr2004.pdf"
  pubclosed: "https://www.cambridge.org/core/journals/latin-american-research-review/article/vote-buying-in-argentina/0E6DDCD3ECBD98210D57D006EDC668CF"
  categories: 
    - Clientelism
    - Argentina
  abstract: "We analyze vote buying in Argentina—the payment by political parties of minor benefits (food, clothing, cash) to citizens in exchange for their votes. How widespread is vote buying in Argentina, and what is the profile of the typical vote <q>seller</q>? Did the shift toward a neoliberal economic model in the 1990s increase or reduce vote buying? Why do parties attempt to buy votes when the ballot is secret and people could simply accept campaign handouts and then vote as they wish? We analyze responses to surveys we conducted in Argentina in 2002 and offer answers to these questions. Our findings suggest that vote buying is an effective strategy for mobilizing electoral support among low-income people when parties are able to monitor voters' actions, make reasonably accurate inferences about how individuals voted, and credibly threaten to punish voters who defect from the implicit clientelist bargain. Our results point toward ballot reform as one way to reduce vote buying in Argentina."

