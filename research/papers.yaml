- title: "Economic Reform and Public Opinion in Peru, 1990-1995."
  type: "Article"
  author:
    - Susan Stokes
  year: 1996
  date: 1996-01-20
  journal: "Comparative Political Studies"
  pdf: "../files/cps-peru1996.pdf"
  pubclosed: "https://journals.sagepub.com/doi/abs/10.1177/0010414096029005003"
  categories:
    - Political Economy
    - Peru
    - Public Opinion
  abstact: "Even if they are confident that prosperity lies just over the horizon, politicians who embark on promarket reforms know they are in for some stormy weather. How will they fare in voters' eyes once the pain is felt? Will voters inevitably turn against politicians who impose painful measures without an electoral mandate to do so? The story of economic reform and public opinion in Peru under Alberto Fujimori (1990-1995) poses just these questions. The author uses monthly public opinion polls and monthly economic data to analyze the impact of economic changes during Fujimori's reform program on opinions of the reforms and the president. The author finds that Limeños withdrew support from the program and the president when employment fell and inflation rose, responses consistent with the findings of the economic voting literature. But when real wages fell, they became optimistic about the future and more likely to support reforms and the government."

- title: "Accountability for Realists."
  type: "Article"
  author:
    - Susan Stokes
  year: 2018
  date: 2018-02-02
  journal: "Critical Review"
  pubclosed: "https://www.tandfonline.com/doi/abs/10.1080/08913811.2018.1473111"
  categories:
    - Accountability
  Abstract: "In Democracy for Realists, Christopher Achen and Larry Bartels argue that voters are shortsighted and punish incumbents for politically irrelevant outcomes. These failings, in the authors’ view, mean that voters are incapable of holding politicians to account. But Achen and Bartels overstate voters’ failure to engage in effective retrospective voting. The authors also understate the degree to which accountability can be compatible with voters’ being myopic, such as when early- and late-term performance are correlated. Achen and Bartels also overlook evidence that the American state acted as an insurer against social risk long before the New Deal, a fact that points to voters using relevant criteria (not irrelevant ones) when they appear to punish incumbents for natural disasters. Finally, while accountability is an important consequentialist reason for democracy, we should keep in mind non-consequentialist justifications for this system of government, in particular its instantiation of political equality."

