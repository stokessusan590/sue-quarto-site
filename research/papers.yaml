- title: "Democracy, Interrupted: Regime Change and Partisanship in Twentieth-Century Argentina"
  type: "Article"
  author:
    - Noam Lupu
    - Susan Stokes
  year: 2010
  date: 2010-06-01
  journal: "Electoral Studies"
  pubclosed: "https://www.sciencedirect.com/science/article/pii/S0261379409000894"
  categories:
    - Parties
    - Argentina
  abstract: "Electoral volatility is much higher in new than in advanced democracies. Some scholars contend that weak partisan ties among the electorate lie behind this high volatility. Political parties in new democracies do not invest in building strong linkages with voters, they claim; hence partisanship is not widespread, nor does it grow over time. Our view is that democratic processes do encourage the spread of partisanship and hence the stabilization of electoral outcomes over time in new democracies. But this dynamic can be masked by countervailing factors and cut short by regime instability. We expect that, all else being equal, volatility will decline over time as a new democracy matures but increase again when democracy is interrupted. We use disaggregated ecological data from Argentina over nearly a century to show that electoral stability grows during democratic periods and erodes during dictatorships."

- title: "The Social Bases of Political Parties in Argentina, 1912-2003"
  type: "Article"
  author:
    - Noam Lupu
    - Susan Stokes
  year: 2009
  date: 2009-06-01
  journal: "Latin American Research Review"
  pubopen: "https://www.cambridge.org/core/journals/latin-american-research-review/article/social-bases-of-political-parties-in-argentina-19122003/96E559952E4E4DEC17215F004794DD87"
  categories:
    - Parties
    - Argentina
  abstract: "To what extent has the Argentine party system been polarized along class lines? The political historiography gives mixed and contradictory answers to this question. We explore the social bases of Argentina's political parties using an original database, the most comprehensive database of Argentine elections yet assembled, and new methods of ecological inference that yield more reliable results than previous analyses. We identify two distinct party systems, one in place between 1912 and 1940, the other emerging after 1946. The first party system was not consistently class based, but the second was, with the Radical Party representing the middle classes and the Peronists, workers and the poor. Still, there were important exceptions. Lower-class support for the Peronists, as proxied by literacy rates, declined during Perón's exile, which implies that the party had trouble mobilizing lower-class illiterate voters. Since the return to democracy in 1983, class polarization has again found some expression in the party system."

- title: "Political Parties and Democracy"
  type: "Article"
  author:
    - Susan Stokes
  year: 1999
  date: 1999-06-01
  journal: "Annual Review of Political Science"
  pdf: "../files/annual-review1999.pdf"
  pubclosed: "https://www.annualreviews.org/content/journals/10.1146/annurev.polisci.2.1.243"
  categories:
    - Parties
  abstract: "A central claim of democratic theory is that democracy induces governments to be responsive to the preferences of the people. Political parties organize politics in every modern democracy, and some observers claim that parties are what induce democracies to be responsive. Yet, according to others, parties give voice to extremists and reduce the responsiveness of governments to the citizenry. The debate about parties and democracy takes on renewed importance as new democracies around the globe struggle with issues of representation and governability. I show that our view of the impact of parties on democratic responsiveness hinges on what parties are—their objectives and organization. I review competing theories of parties, sketch their testable implications, and note the empirical findings that may help adjudicate among these theories. I also review debates about the origins of parties, about the determinants of party-system size and characteristics, and about party competition."

- title: "¿Son los partidos políticos el problema de la América Latina?"
  type: "Article"
  author: 
    - Susan Stokes
  year: 1998
  date: 1998-06-01
  journal: "Política y Gobierno"
  pdf: "../files/politica_y_gobierno1998.pdf"
  pubclosed: "http://www.politicaygobierno.cide.edu/index.php/pyg/article/view/509"
  categories:
    - Parties
    - Spanish-language
  abstract: "Los estudiosos responsabilizan a los partidos políticos débiles y a los sistemas de partidos volátiles de las deficiencias de las democracias latinoamericanas. Entre éstas se encuentra la decir, la tendencia de los políticos a pronunciarse a favor de ciertas políticas durante las campañas y luego a abandonarlas una vez que están en el poder. Sin embargo, la teoría política y la experiencia de América Latina plantean expectativas contradictorias: que los partidos fuertes pueden aumentar la capacidad de respuesta y que pueden reducirla. Los estudios de caso y el análisis estadístico de datos nacionales presentados en este artículo muestran que tanto los partidos débiles en sistemas volátiles como los partidos fuertes en sistemas estables realizaron drásticos y tempranos cambios de políticas. Para comprender estos cambios, debemos ver más allá de las deficiencias de los partidos políticos. Se concluye con algunas reflexiones acerca de la conveniencia normativa de la respuesta al mandato popular."

