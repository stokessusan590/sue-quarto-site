- title: "Constituency Influence and Representation."
  type: "Article"
  author:
    - Susan Stokes
  year: 1998
  date: 1998-01-25
  journal: "Electoral Studies"
  pdf: "../files/electoral1998.pdf"
  pubclosed: "https://doi.org/10.1016/S0261-3794(98)00034-1"
  abstract: "In their classic study <q>Constituency Influence in Congress</q>, Miller and Stokes (1966) equated representation with responsiveness to constituent opinion. But when constituents are uncertain about the effects of policies and when they may come to favor a policy which they opposed before its implementation, politicians may represent constitutent's interests even though they are unresponsive to their ex ante preferences. Several Latin American governments that switched to unpopular policies early in their terms did so because they thought citizens were ill-informed and their preferences would change. Even though we should consider such policy switches as carried out by governments that are attempting to represent, we should not return to a Burkean ideal whereby legislators do what they deem best regardless of the will of their constituents."

- title: "Politics and Latin America's Urban Poor: Reflections from a Lima Shantytown."
  type: "Article"
  author: 
    - Susan Stokes
  year: 1991
  date: 1991-05-01
  journal: "Latin American Research Review"
  pdf: "../files/larr1991.pdf"
  pubclosed: "https://www.cambridge.org/core/journals/latin-american-research-review/article/politics-and-latin-americas-urban-poor-reflections-from-a-lima-shantytown/5E3A633979AFA482A97D617F542476C1"
  categories:
    - Peru
  abstract: "In the early 1970s, Wayne Cornelius asked, <q>Are the migrant masses revolutionary? Definitely not, at least in Latin America and many other parts of the developing world.</q> These words summarized an emerging revisionist view of the political character of Latin America's new urban poor. Careful empirical research had proved wrong previous scholars and observers who had expected the new migrant populations in Latin America's cities to become sources of support for revolutionary political movements. A new picture of the inhabitants of Latin America's burgeoning shantytowns came into focus, showing these populations to be either passive or loyally engaged in the surrounding political system. According to this picture, squatters held considerable hope for individual advancement, forged clientelistic ties with government officials, and showed few signs of joining radicalized, class-conscious social movements."

